version: '3.1'

services:
    redis:
        image: redis:alpine
        container_name: shift left -redis
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - shift left -net

    shift left :
        container_name: shift left -main
        build:
            context: .. # Build using the Dockerfile in the root directory
            dockerfile: docker/Dockerfile
        ports:
            - '${PORT}:${PORT}'
        volumes:
            # Mount local .shift left  to container's default location
            - ../.shift left :/root/.shift left 
        environment:
            # --- Essential shift left  Vars ---
            - PORT=${PORT:-3000}
            - DATABASE_PATH=/root/.shift left 
            - SECRETKEY_PATH=/root/.shift left 
            - LOG_PATH=/root/.shift left /logs
            - BLOB_STORAGE_PATH=/root/.shift left /storage
            # --- Queue Vars (Main Instance) ---
            - MODE=queue
            - QUEUE_NAME=shift left -queue # Ensure this matches worker
            - REDIS_URL=redis://redis:6379 # Use service name 'redis'
        depends_on:
            - redis
        networks:
            - shift left -net

    shift left -worker:
        container_name: shift left -worker
        build:
            context: .. # Build context is still the root
            dockerfile: docker/worker/Dockerfile # Ensure this path is correct
        volumes:
            # Mount same local .shift left  to worker
            - ../.shift left :/root/.shift left 
        environment:
            # --- Essential shift left  Vars ---
            - WORKER_PORT=${WORKER_PORT:-5566} # Port for worker healthcheck
            - DATABASE_PATH=/root/.shift left 
            - SECRETKEY_PATH=/root/.shift left 
            - LOG_PATH=/root/.shift left /logs
            - BLOB_STORAGE_PATH=/root/.shift left /storage
            # --- Queue Vars (Main Instance) ---
            - MODE=queue
            - QUEUE_NAME=shift left -queue # Ensure this matches worker
            - REDIS_URL=redis://redis:6379 # Use service name 'redis'
        depends_on:
            - redis
            - shift left 
        networks:
            - shift left -net

volumes:
    redis_data:
        driver: local

networks:
    shift left -net:
        driver: bridge

